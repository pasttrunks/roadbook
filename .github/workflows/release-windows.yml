name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt

      - name: Run parser regression test
        run: node tests/parser.test.cjs

      - name: Build Roadbook
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Roadbook --icon roadbook.ico `
            --add-data "index.html;." `
            --add-data "styles.css;." `
            --add-data "app.js;." `
            --add-data "roadbook.png;." `
            desktop_app.py

      - name: Package Windows download
        shell: pwsh
        run: Compress-Archive -Path dist\Roadbook -DestinationPath Roadbook-Windows.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Roadbook-Windows
          path: Roadbook-Windows.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Roadbook-Windows.zip
          generate_release_notes: true
          make_latest: true
