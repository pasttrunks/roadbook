name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt

      - name: Run JavaScript regression tests
        shell: pwsh
        run: Get-ChildItem tests\*.test.cjs | ForEach-Object { node $_.FullName }

      - name: Run storage and updater regression tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build Roadbook
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Roadbook --icon roadbook.ico `
            --add-data "index.html;." `
            --add-data "styles.css;." `
            --add-data "app.js;." `
            --add-data "roadbook.png;." `
            desktop_app.py

      - name: Launch-test packaged application
        shell: pwsh
        run: |
          $env:ROADBOOK_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook.exe" `
            -ArgumentList "--smoke-test" -PassThru

          if (-not $process.WaitForExit(30000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Packaged Roadbook did not complete its smoke test within 30 seconds."
          }

          if ($process.ExitCode -ne 0) {
            throw "Packaged Roadbook exited with code $($process.ExitCode)."
          }

          if (-not (Test-Path $env:ROADBOOK_SMOKE_FILE)) {
            throw "Packaged Roadbook never reached the loaded interface."
          }

      - name: Test packaged offline PDF extraction
        shell: pwsh
        run: |
          $pdf = Join-Path $env:RUNNER_TEMP "roadbook-searchable.pdf"
          $env:ROADBOOK_PDF_FIXTURE = $pdf
          @'
          import os
          import fitz
          doc = fitz.open()
          page = doc.new_page()
          page.insert_text((72, 72), "ROADBOOK PDF SMOKE - searchable maintenance history")
          doc.save(os.environ["ROADBOOK_PDF_FIXTURE"])
          doc.close()
          '@ | python -

          $env:ROADBOOK_PDF_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-pdf-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook.exe" -ArgumentList @("--pdf-smoke-test", $pdf) -PassThru -Wait
          if ($process.ExitCode -ne 0 -or -not (Test-Path $env:ROADBOOK_PDF_SMOKE_FILE)) {
            throw "Packaged Roadbook could not extract searchable PDF text offline."
          }

      - name: Test packaged scanned-PDF OCR
        shell: pwsh
        run: |
          $pdf = Join-Path $env:RUNNER_TEMP "roadbook-scanned.pdf"
          $env:ROADBOOK_PDF_FIXTURE = $pdf
          @'
          import os
          import fitz

          source = fitz.open()
          page = source.new_page(width=612, height=792)
          page.insert_text((72, 120), "ROADBOOK PDF SMOKE - scanned maintenance history", fontsize=20)
          pix = page.get_pixmap(dpi=200, colorspace=fitz.csRGB, alpha=False)
          source.close()

          scanned = fitz.open()
          scanned_page = scanned.new_page(width=612, height=792)
          scanned_page.insert_image(scanned_page.rect, stream=pix.tobytes("png"))
          scanned.save(os.environ["ROADBOOK_PDF_FIXTURE"])
          scanned.close()
          '@ | python -

          $env:ROADBOOK_PDF_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-ocr-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook.exe" -ArgumentList @("--pdf-smoke-test", $pdf) -PassThru -Wait
          if ($process.ExitCode -ne 0 -or -not (Test-Path $env:ROADBOOK_PDF_SMOKE_FILE)) {
            throw "Packaged Roadbook could not OCR a scanned PDF offline."
          }

      - name: Test updater replacement and restart
        shell: pwsh
        run: |
          $testRoot = Join-Path $env:RUNNER_TEMP "roadbook-updater-restart"
          $install = Join-Path $testRoot "install"
          New-Item -ItemType Directory -Path $install -Force | Out-Null
          Copy-Item dist\Roadbook.exe (Join-Path $install "Roadbook.exe")

          $env:ROADBOOK_UPDATE_SOURCE = (Resolve-Path "dist\Roadbook.exe").Path
          $env:ROADBOOK_UPDATE_INSTALL = $install
          @'
          import os
          from pathlib import Path
          from roadbook_core import ReleaseUpdater

          source = Path(os.environ["ROADBOOK_UPDATE_SOURCE"])
          install = Path(os.environ["ROADBOOK_UPDATE_INSTALL"])
          script = ReleaseUpdater._updater_script(source, install, 999999)
          (install.parent / "restart.ps1").write_text(script, encoding="utf-8-sig")
          '@ | python -

          $env:APPDATA = Join-Path $testRoot "appdata"
          $env:ROADBOOK_SMOKE_FILE = Join-Path $testRoot "restart-ok.txt"
          $env:ROADBOOK_UPDATE_SMOKE_TEST = "1"
          $env:_PYI_APPLICATION_HOME_DIR = Join-Path $testRoot "expired-_MEI"
          $env:_PYI_ARCHIVE_FILE = Join-Path $install "Roadbook.exe"

          powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass `
            -File (Join-Path $testRoot "restart.ps1")

          $deadline = (Get-Date).AddSeconds(40)
          while (-not (Test-Path $env:ROADBOOK_SMOKE_FILE) -and (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 500
          }
          if (-not (Test-Path $env:ROADBOOK_SMOKE_FILE)) {
            throw "Updated Roadbook did not restart with a fresh PyInstaller runtime."
          }

      - name: Test standalone browser download
        shell: pwsh
        run: |
          Set-Content -LiteralPath "dist\Roadbook.exe" -Stream Zone.Identifier -Value @"
          [ZoneTransfer]
          ZoneId=3
          ReferrerUrl=https://github.com/pasttrunks/roadbook/releases/latest
          "@

          $zone = Get-Content -LiteralPath "dist\Roadbook.exe" -Stream Zone.Identifier -Raw
          if ($zone -notmatch "ZoneId=3") {
            throw "The browser-download test could not apply Mark-of-the-Web."
          }

          # An unsigned internet download is approved by the user through the
          # Windows SmartScreen prompt. Unblock-File reproduces that approval so
          # CI can launch the app non-interactively.
          Unblock-File -LiteralPath "dist\Roadbook.exe"

          $env:ROADBOOK_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-motw-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook.exe" `
            -ArgumentList "--smoke-test" -PassThru

          if (-not $process.WaitForExit(30000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Standalone Roadbook did not start after download approval."
          }

          if ($process.ExitCode -ne 0 -or -not (Test-Path $env:ROADBOOK_SMOKE_FILE)) {
            throw "Standalone Roadbook failed its browser-download test."
          }

      - name: Package Windows download
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package\Roadbook -Force | Out-Null
          Copy-Item dist\Roadbook.exe package\Roadbook\Roadbook.exe
          Copy-Item Roadbook.exe.config package\Roadbook\Roadbook.exe.config
          Compress-Archive -Path package\Roadbook -DestinationPath Roadbook-Windows.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Roadbook-Windows
          path: |
            dist/Roadbook.exe
            Roadbook-Windows.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Roadbook.exe
            Roadbook-Windows.zip
          body_path: RELEASE_NOTES.md
          make_latest: true
