name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt

      - name: Run JavaScript regression tests
        shell: pwsh
        run: Get-ChildItem tests\*.test.cjs | ForEach-Object { node $_.FullName }

      - name: Build Roadbook
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name Roadbook --icon roadbook.ico `
            --add-data "index.html;." `
            --add-data "styles.css;." `
            --add-data "app.js;." `
            --add-data "roadbook.png;." `
            desktop_app.py

          Copy-Item Roadbook.exe.config dist\Roadbook\Roadbook.exe.config

      - name: Launch-test packaged application
        shell: pwsh
        run: |
          $env:ROADBOOK_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook\Roadbook.exe" `
            -ArgumentList "--smoke-test" -PassThru

          if (-not $process.WaitForExit(30000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Packaged Roadbook did not complete its smoke test within 30 seconds."
          }

          if ($process.ExitCode -ne 0) {
            throw "Packaged Roadbook exited with code $($process.ExitCode)."
          }

          if (-not (Test-Path $env:ROADBOOK_SMOKE_FILE)) {
            throw "Packaged Roadbook never reached the loaded interface."
          }

      - name: Test browser-download trust marking
        shell: pwsh
        run: |
          $runtimeDll = "dist\Roadbook\_internal\pythonnet\runtime\Python.Runtime.dll"
          Set-Content -LiteralPath $runtimeDll -Stream Zone.Identifier -Value @"
          [ZoneTransfer]
          ZoneId=3
          ReferrerUrl=https://github.com/pasttrunks/roadbook/releases/latest
          "@

          $env:ROADBOOK_SMOKE_FILE = Join-Path $env:RUNNER_TEMP "roadbook-motw-smoke-ok.txt"
          $process = Start-Process -FilePath "dist\Roadbook\Roadbook.exe" `
            -ArgumentList "--smoke-test" -PassThru

          if (-not $process.WaitForExit(30000)) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Roadbook did not start with internet-marked bundled files."
          }

          if ($process.ExitCode -ne 0 -or -not (Test-Path $env:ROADBOOK_SMOKE_FILE)) {
            throw "Roadbook failed its browser-download trust-marking test."
          }

      - name: Package Windows download
        shell: pwsh
        run: Compress-Archive -Path dist\Roadbook -DestinationPath Roadbook-Windows.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Roadbook-Windows
          path: Roadbook-Windows.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Roadbook-Windows.zip
          generate_release_notes: true
          make_latest: true
